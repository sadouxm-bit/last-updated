<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last Commit Date</title>
    <script>
        async function fetchLastCommitDate() {
            const response = await fetch('https://api.github.com/repos/sadouxm-bit/last-updated/commits');
            const commits = await response.json();
            const lastCommit = commits[0];
            const lastCommitDate = lastCommit.commit.committer.date;
            document.getElementById('commit-date').innerText = `Last Commit Date: ${new Date(lastCommitDate).toUTCString()}`;
        }
        window.onload = fetchLastCommitDate;
    </script>
</head>
<body>
    <h1>Welcome to the Last Updated Repository</h1>
    <p id="commit-date">Fetching last commit date...</p>
</body>
</html>
