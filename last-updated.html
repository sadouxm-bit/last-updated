<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Last Updated</title>\n    <script>\n        document.addEventListener('DOMContentLoaded', function () {\n            const lastUpdated = new Date('2026-03-19T18:57:30Z');\n            document.getElementById('last-updated').innerText = 'Last updated: ' + lastUpdated.toUTCString();\n        });\n    </script>\n</head>\n<body>\n    <div>\n        <h1>Page Information</h1>\n        <p id="last-updated"></p>\n        <iframe src="https://example.com" width="600" height="400">\n            Your browser does not support iframes.\n        </iframe>\n    </div>\n</body>\n</html>
